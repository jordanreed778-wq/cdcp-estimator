kind = "web"
previewPath = "/"
title = "CDCP Eligibility Estimator"
version = "1.0.0"
id = "artifacts/cdcp-estimator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22324

[services.development]
run = "pnpm --filter @workspace/cdcp-estimator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cdcp-estimator", "run", "build" ]
publicDir = "artifacts/cdcp-estimator/dist/public"
serve = "static"

[services.env]
PORT = "22324"
BASE_PATH = "/"
